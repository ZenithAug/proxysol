name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  mobile-responsiveness-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Check for mobile-responsive classes
        run: |
          echo "Checking mobile-responsive Tailwind classes..."

          # Check that section-pinned uses responsive classes
          if grep -q "min-h-screen lg:h-screen" src/index.css; then
            echo "✓ section-pinned uses responsive height classes"
          else
            echo "✗ section-pinned missing responsive height classes"
            exit 1
          fi

          # Check that h-full is properly guarded on mobile
          if grep -q "h-auto lg:h-full" src/sections/Hero.tsx; then
            echo "✓ Hero section uses responsive height classes"
          else
            echo "✗ Hero section missing responsive height classes"
            exit 1
          fi

          # Check all pinned sections have been updated
          FILES="src/sections/Hero.tsx src/sections/AINative.tsx src/sections/MCPServer.tsx src/sections/PeerMarket.tsx src/sections/TokenEconomy.tsx"
          for file in $FILES; do
            if grep -q "min-h-full lg:h-full" "$file"; then
              echo "✓ $file has responsive container height"
            else
              echo "✗ $file missing responsive container height"
              exit 1
            fi
          done

          echo "All mobile-responsiveness checks passed!"
